version: "2"

run:
  go: "1.25"

linters:
  enable:
    - misspell
    - prealloc

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    staticcheck:
      checks:
        - all

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt

  settings:
    gofmt:
      simplify: true

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
